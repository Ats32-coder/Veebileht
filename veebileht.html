<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Interaktiivne veebileht</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>

</head>
<body>
<div class="center">
    <h1>Minu interaktiivne veebileht</h1>  <!-- Pealkiri -->

    <!-- TO-DO LIST -->
    <div class="container"> <!-- Sektsiooni konteiner -->
        <h2>To-Do List</h2> <!-- Sektsiooni pealkiri -->
        <input type="text" id="taskInput" placeholder="Lisa ülesanne"> <!-- Tekstiväli -->
        <button onclick="addTask()">Lisa</button> <!-- Nupp, mis käivitab funktsiooni -->
        <ul id="taskList"></ul> <!-- Tühi loend ülesannete jaoks -->
    </div>

    <!-- KALKULAATOR -->
    <div class="container"> <!-- Sektsiooni konteiner -->
        <h2>Kalkulaator</h2> <!-- Sektsiooni pealkiri -->
        <input type="number" id="num1" placeholder="Esimene number"> <!-- Esimene number -->
        <input type="number" id="num2" placeholder="Teine number"> <!-- Teine number -->
        <br> <!-- Reavahetus -->
        <button onclick="calculate('+')">+</button> <!-- Liitmine -->
        <button onclick="calculate('-')">-</button> <!-- Lahutamine -->
        <button onclick="calculate('*')">*</button> <!-- Korrutamine -->
        <button onclick="calculate('/')">/</button> <!-- Jagamine -->
        <p>Tulemus: <span style="font-weight: bold;" id="result">0</span></p> <!-- Tulemus kuvatakse siin ja boldis -->
    </div>

    <!-- VORMI VALIDEERIMINE -->
    <div class="container"> <!-- Sektsiooni konteiner -->
        <h2>Registreerimisvorm</h2> <!-- Sektsiooni pealkiri -->
        <form onsubmit="return validateForm()"> <!-- Vorm, mis käivitab kontrolli -->
            <input type="text" id="name" placeholder="Nimi"><br> <!-- Nime sisestus -->
            <input type="email" id="email" placeholder="Email"><br> <!-- Emaili sisestus -->
            <button type="submit">Saada</button> <!-- Vormi saatmise nupp -->
            <p id="errorMsg" class="error"></p> <!-- Veateate kuvamine -->
        </form>
    </div>
</div>
</body>
</html>
